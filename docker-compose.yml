services:
  cpacodexkeeper:
    build: .
    container_name: cpacodexkeeper
    restart: unless-stopped
    command: ["python", "main.py", "--web"]
    ports:
      - "${CPA_WEB_PORT:-8080}:${CPA_WEB_PORT:-8080}"
    environment:
      CPA_ENDPOINT: ${CPA_ENDPOINT}
      CPA_TOKEN: ${CPA_TOKEN}
      CPA_PROXY: ${CPA_PROXY:-}
      CPA_INTERVAL: ${CPA_INTERVAL:-1800}
      CPA_QUOTA_THRESHOLD: ${CPA_QUOTA_THRESHOLD:-100}
      CPA_EXPIRY_THRESHOLD_DAYS: ${CPA_EXPIRY_THRESHOLD_DAYS:-3}
      CPA_ENABLE_REFRESH: ${CPA_ENABLE_REFRESH:-true}
      CPA_HTTP_TIMEOUT: ${CPA_HTTP_TIMEOUT:-30}
      CPA_USAGE_TIMEOUT: ${CPA_USAGE_TIMEOUT:-15}
      CPA_MAX_RETRIES: ${CPA_MAX_RETRIES:-2}
      CPA_WORKER_THREADS: ${CPA_WORKER_THREADS:-8}
      CPA_WEB_HOST: ${CPA_WEB_HOST:-0.0.0.0}
      CPA_WEB_PORT: ${CPA_WEB_PORT:-8080}
      CPA_WEB_REFRESH_INTERVAL: ${CPA_WEB_REFRESH_INTERVAL:-30}
